meters:
  - meter_id: M1
    video_device: /dev/v4l/by-id/usb-046d_B525_HD_Webcam_63928130-video-index0
    focus: 95
    focus_settle_s: 8.0
    aligned_width: 500
    aligned_height: 120
    threshold_mode: otsu
    invert_binary: true
    perspective_src_points:
    #The first for numbers are for boke web export images
#      - [7, 14]             # top-left
#      - [252, 10]             # top-right
#      - [254, 51]             # bottom-right
#      - [6, 56]             # bottom-left
    #The last for is for live camera images
      - [926, 669]             # top-left
      - [1174, 665]             # top-right
      - [1175, 708]             # bottom-right
      - [925, 712]             # bottom-left    
    inner_pad_x: 2
    inner_pad_y: 2
    digit_boxes:
      - { x: 0,   y: 0, w: 60, h: 120 }
      - { x: 106,  y: 0, w: 60, h: 120 }
      - { x: 212, y: 0, w: 60, h: 120 }
      - { x: 322, y: 0, w: 60, h: 120 }
      - { x: 434, y: 0, w: 60, h: 120 }


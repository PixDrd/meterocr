meters:
  - meter_id: M1
    video_device: /dev/video0
    aligned_width: 500
    aligned_height: 120
    threshold_mode: otsu
    invert_binary: true
    crop_source_box: { x: 120, y: 80, w: 500, h: 120 }
    max_translation_px: 4
    inner_pad_x: 2
    inner_pad_y: 2
    digit_boxes:
      - { x: 0,   y: 0, w: 92, h: 120 }
      - { x: 96,  y: 0, w: 92, h: 120 }
      - { x: 192, y: 0, w: 92, h: 120 }
      - { x: 288, y: 0, w: 92, h: 120 }
      - { x: 384, y: 0, w: 92, h: 120 }

  - meter_id: M2
    video_device: /dev/video2
    aligned_width: 500
    aligned_height: 120
    threshold_mode: otsu
    invert_binary: true
    crop_source_box: { x: 140, y: 90, w: 500, h: 120 }
    max_translation_px: 4
    inner_pad_x: 2
    inner_pad_y: 2
    digit_boxes:
      - { x: 0,   y: 0, w: 92, h: 120 }
      - { x: 96,  y: 0, w: 92, h: 120 }
      - { x: 192, y: 0, w: 92, h: 120 }
      - { x: 288, y: 0, w: 92, h: 120 }
      - { x: 384, y: 0, w: 92, h: 120 }

  - meter_id: M3
    video_device: /dev/video4
    aligned_width: 500
    aligned_height: 120
    threshold_mode: otsu
    invert_binary: true
    crop_source_box: { x: 160, y: 100, w: 500, h: 120 }
    max_translation_px: 4
    inner_pad_x: 2
    inner_pad_y: 2
    digit_boxes:
      - { x: 0,   y: 0, w: 92, h: 120 }
      - { x: 96,  y: 0, w: 92, h: 120 }
      - { x: 192, y: 0, w: 92, h: 120 }
      - { x: 288, y: 0, w: 92, h: 120 }
      - { x: 384, y: 0, w: 92, h: 120 }
